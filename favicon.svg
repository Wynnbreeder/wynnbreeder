<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .wood { fill: #6d431a; }
      .wood-light { fill: #8a5a2b; }
      .gold { fill: #FFD700; }
      .lime { fill: #7FFF00; }
      .lime-shadow { fill: #5FD000; }
    </style>
  </defs>
  
  <!-- Ornate wooden border/frame -->
  <polygon class="wood" points="50,5 95,25 95,75 50,95 5,75 5,25"/>
  <polygon class="wood-light" points="50,12 88,28 88,72 50,88 12,72 12,28"/>
  
  <!-- Gold hexagon center -->
  <polygon class="gold" points="50,20 65,28 65,44 50,52 35,44 35,28"/>
  <polygon class="gold" points="50,28 60,33 60,43 50,48 40,43 40,33" opacity="0.8"/>
  
  <!-- Lime green W with shadow effect -->
  <text x="28" y="60" font-size="28" font-weight="bold" class="lime-shadow" font-family="Arial, sans-serif" letter-spacing="2">W</text>
  <text x="27" y="59" font-size="28" font-weight="bold" class="lime" font-family="Arial, sans-serif" letter-spacing="2">W</text>
  
  <!-- Lime green B with shadow effect -->
  <text x="56" y="60" font-size="28" font-weight="bold" class="lime-shadow" font-family="Arial, sans-serif">B</text>
  <text x="55" y="59" font-size="28" font-weight="bold" class="lime" font-family="Arial, sans-serif">B</text>
</svg>
